name: SAF Normalization Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  normalize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install SAF CLI
        run: |
          npm install -g @mitre/saf@1.4.13
          saf --version
