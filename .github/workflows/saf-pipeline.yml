name: SAF Normalization Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  normalize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install SAF CLI from GitHub releases
        run: |
          curl -sL https://github.com/mitre/saf/releases/latest/download/saf-linux-x64.tar.gz -o saf.tar.gz
          tar -xzf saf.tar.gz
          sudo mv saf /usr/local/bin/saf
          saf --version

      - name: Create output directories
        run: |
          mkdir -p hdf_output
          mkdir -p hdf_output/prowler

      - name: Convert CKL to HDF
        run: |
          for f in sample_data/ckl/*.ckl; do
            [ -f "$f" ] || { echo "No CKL files found"; continue; }
            base=$(basename "$f" .ckl)
            echo "Converting: $f"
            saf convert ckl2hdf -i "$f" -o "hdf_output/${base}_ckl.json" && echo "Success" || echo "Failed: $f"
          done

      - name: Convert Nessus to HDF
        run: |
          for f in sample_data/nessus/*.nessus; do
            [ -f "$f" ] || { echo "No Nessus files found"; continue; }
            base=$(basename "$f" .nessus)
            echo "Converting: $f"
            saf convert nessus2hdf -i "$f" -o "hdf_output/${base}_nessus.json" && echo "Success" || echo "Failed: $f"
            ls -la "hdf_output/${base}_nessus.json" 2>/dev/null || echo "  (not created)"
          done

      - name: Convert SCAP/XCCDF to HDF
        run: |
          for f in sample_data/scap/*.xml; do
            [ -f "$f" ] || { echo "No SCAP files found — skipping"; continue; }
            base=$(basename "$f" .xml)
            echo "Converting: $f"
            saf convert xccdf_results2hdf -i "$f" -o "hdf_output/${base}_scap.json" && echo "Success" || echo "Failed: $f"
          done

      - name: Convert Prowler to HDF
        run: |
          for f in sample_data/prowler/*.json; do
            [ -f "$f" ] || { echo "No Prowler files found — skipping"; continue; }
            base=$(basename "$f" .json)
            echo "Converting: $f"
            saf convert prowler2hdf -i "$f" -o "hdf_output/prowler" && echo "Success" || echo "Failed: $f"
          done

      - name: Convert Microsoft Secure Score to HDF
        run: |
          for f in sample_data/secure_score/*.json; do
            [ -f "$f" ] || { echo "No Secure Score files found — skipping"; continue; }
            base=$(basename "$f" .json)
            echo "Converting: $f"
            saf convert msft_secure2hdf -i "$f" -o "hdf_output/${base}_secure_score.json" && echo "Success" || echo "Failed: $f"
          done

      - name: List all HDF outputs
        run: |
          echo "=============================="
          echo " ALL FILES IN hdf_output/"
          echo "=============================="
          find hdf_output/ -name "*.json" | sort
          echo "Total JSON files: $(find hdf_output/ -name '*.json' | wc -l)"

      - name: View summaries
        run: |
          echo "=============================="
          echo " HDF CONVERSION SUMMARY"
          echo "=============================="
          find hdf_output/ -name "*.json" | sort | while read f; do
            echo ""
            echo ">>> $f"
            saf view summary -i "$f" || echo "  (summary unavailable)"
          done

      - name: Upload HDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hdf-results
          path: hdf_output/
          retention-days: 30
